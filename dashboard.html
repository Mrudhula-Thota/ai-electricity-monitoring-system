<!DOCTYPE html>
<html>

<head>
    <title>Electricity Dashboard</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h2>⚡ Electricity Monitoring Dashboard</h2>

    <!-- Dashboard Card -->
    <div class="card">
        <h3>Usage Summary</h3>

        <p id="todayUsage">Today's Consumption: 0 kWh</p>
        <p id="monthUsage">Monthly Consumption: 0 kWh</p>

        <button onclick="logout()">Logout</button>
    </div>

    <!-- Add Usage Card -->
    <div class="card">
        <h3>Add Usage</h3>

        <label>Units (kWh)</label><br>

        <input type="number" id="usageInput" placeholder="Enter units">

        <br><br>

        <button onclick="addUsage()">Add Usage</button>
    </div>

    <!-- Chart Card -->
    <div class="card">
        <h3>Usage Chart</h3>

        <!-- IMPORTANT: id must be myChart -->
        <canvas id="usageChart"></canvas>
    </div>

    <!-- Table Card -->
    <div class="card">
        <h3>Usage History</h3>

        <table border="1" style="width:100%; text-align:center;">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Units (kWh)</th>
                </tr>
            </thead>

            <tbody id="usageTable"></tbody>
        </table>
    </div>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Script File -->
    <script src="script.js"></script>

</body>

</html>
